name: football_elite_mobile
description: Football Elite Mobile - The Ultimate Football Game
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI/UX
  flutter_native_splash: ^2.3.0
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  animate_do: ^3.1.2
  flutter_staggered_animations: ^1.1.1
  
  # State Management
  provider: ^6.0.5
  get_it: ^7.6.4
  
  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  
  # Network
  dio: ^5.3.2
  web_socket_channel: ^2.4.0
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.14.0
  
  # Game Engine
  flame: ^1.10.0
  audioplayers: ^5.2.1
  
  # Performance
  flutter_performance: ^0.1.0+1
  device_info_plus: ^9.1.0
  
  # Utils
  intl: ^0.18.1
  path_provider: ^2.1.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.1
  
  # Payment
  in_app_purchase: ^3.1.9
  
  # Ads
  google_mobile_ads: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/
    - assets/sounds/
    - assets/animations/
  
  fonts:
    - family: MainFont
      fonts:
        - asset: assets/fonts/main_font.ttf
